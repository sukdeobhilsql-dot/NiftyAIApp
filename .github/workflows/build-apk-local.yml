name: Build Android APK (Local Gradle, no EAS)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Dependencies
        run: npm install

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Bundle JS into APK assets (fixes "Unable to load script")
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Increase Gradle JVM heap size (fixes Java heap space OOM)
        run: |
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError/' android/gradle.properties
          printf "\norg.gradle.daemon=false\norg.gradle.parallel=false\n" >> android/gradle.properties
          echo "----- Final gradle.properties -----"
          cat android/gradle.properties
          echo "------------------------------------"

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NiftyAIPro-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk