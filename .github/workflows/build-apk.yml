name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get APK URL and download
        run: |
          sleep 5
          BUILD_URL=$(eas build:list --platform android --limit 1 \
            --status finished --json --non-interactive | \
            python3 -c "
import sys,json
data=json.load(sys.stdin)
if data: print(data[0].get('artifacts',{}).get('buildUrl',''))
")
          echo "URL: $BUILD_URL"
          curl -L "$BUILD_URL" -o NiftyAIPro.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NiftyAIPro-APK
          path: NiftyAIPro.apk
          retention-days: 30